<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="以安全、循序漸進訓練為核心的健身 RPG。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
  <title>Fitness Odyssey V7.0 Build 2</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">FITNESS ODYSSEY · V7.0 BUILD 2</div>
        <h1 id="page-title">今日主線</h1>
      </div>
      <button id="install-btn" class="btn ghost hidden">安裝</button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="主選單">
      <button data-route="today" class="active"><span>⚔️</span><small>今天</small></button>
      <button data-route="world"><span>🗺️</span><small>世界</small></button>
      <button data-route="academy"><span>🎓</span><small>學院</small></button>
      <button data-route="base"><span>🏠</span><small>基地</small></button>
      <button data-route="hero"><span>💪</span><small>能力</small></button>
      <button data-route="journal"><span>📖</span><small>紀錄</small></button>
      <button data-route="settings"><span>⚙️</span><small>設定</small></button>
    </nav>
  </div>

  <dialog id="modal">
    <div id="modal-content"></div>
    <button id="modal-close" class="btn secondary full">關閉</button>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>

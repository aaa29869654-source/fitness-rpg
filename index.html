<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07101d">
  <meta name="description" content="Fitness Odyssey 新手互動健身教練">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
  <title>Fitness Odyssey · Build 6.1</title>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div><div class="eyebrow">FITNESS ODYSSEY · SOLO BUILD 6.1</div><h1 id="page-title">今日訓練</h1></div>
    <div class="top-actions"><button id="audio-btn" class="icon-btn" aria-label="切換語音">🔊</button><button id="install-btn" class="btn ghost hidden">安裝</button></div>
  </header>
  <main id="view" class="view"></main>
  <nav class="bottom-nav">
    <button data-route="today" class="active"><span>⚔️</span><small>今天</small></button>
    <button data-route="learn"><span>🎬</span><small>教學</small></button>
    <button data-route="progress"><span>📈</span><small>進度</small></button>
    <button data-route="settings"><span>⚙️</span><small>設定</small></button>
  </nav>
</div>
<dialog id="modal"><div id="modal-content"></div><button id="modal-close" class="btn secondary full modal-close">關閉</button></dialog>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script src="./app.js" defer></script>
</body></html>

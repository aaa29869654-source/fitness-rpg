<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="以安全、循序漸進訓練為核心的健身 RPG。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%2307111f'/%3E%3Cpath d='M112 265h58l25-60 42 118 36-158 36 100h91' fill='none' stroke='%2356e39f' stroke-width='30' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='256' cy='256' r='190' fill='none' stroke='%23ffd166' stroke-width='18'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
  <title>Fitness Odyssey V7.0</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">FITNESS ODYSSEY · V7.0 BUILD 1</div>
        <h1 id="page-title">今日主線</h1>
      </div>
      <button id="install-btn" class="btn ghost hidden">安裝</button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="主選單">
      <button data-route="today" class="active"><span>⚔️</span><small>今天</small></button>
      <button data-route="world"><span>🗺️</span><small>世界</small></button>
      <button data-route="academy"><span>🎓</span><small>學院</small></button>
      <button data-route="hero"><span>💪</span><small>能力</small></button>
      <button data-route="journal"><span>📖</span><small>紀錄</small></button>
      <button data-route="settings"><span>⚙️</span><small>設定</small></button>
    </nav>
  </div>

  <dialog id="modal">
    <div id="modal-content"></div>
    <button id="modal-close" class="btn secondary full">關閉</button>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
